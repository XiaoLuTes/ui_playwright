    element: submit_confirm
    action: click
    data: null
  - step_name: 36、点击销售录入合同
    element: entry_contract
    action: click
    data: null
  - step_name: 37、点击关联合同
    element: related_contract
    action: click
    data: null
  - step_name: 38、向下一次
    element: related_contract
    action: down
    data: '1'
  - step_name: 39、回车确认
    element: related_contract
    action: enter
    data: null
  - step_name: 40、验证关联合同选择
    element: related_contract_check
    action: check_text
    data: 一次开票
  - step_name: 41、选择收费模式
    element: pricing_model
    action: click
    data: null
  - step_name: 42、向下一次
    element: pricing_model
    action: down
    data: '1'
  - step_name: 43、回车确认
    element: pricing_model
    action: enter
    data: null
  - step_name: 44、验证收费模式选择
    element: pricing_model_check
    action: check_text
    data: 年薪30%
  - step_name: 45、汇率类型选择offer时间
    element: exchange_type_offer
    action: click
    data: null
  - step_name: 46、税率选择6%
    element: taxrate_1
    action: click
    data: null
  - step_name: 47、点击提交按钮
    element: submit_contract
    action: click
    data: null
