    element: country_click_for_noai
    action: click
    data: null
  - step_name: 24、国家/地区选项栏模糊输入
    element: country
    action: input
    data: japan
  - step_name: 25、回车确认
    element: country
    action: enter
    data: null
  - step_name: 26、验证国家/地区选项栏
    element: country_check_for_noai
    action: check_text
    data: Japan
  - step_name: 27、国家/城市栏输入japan
    element: country_city
    action: input
    data: japan
    expected: true
  - step_name: 28、点击start
    element: start
    action: click
    data: null
  - step_name: 等待元素加载
    element: null
    action: wait
    data: '2'
  - step_name: 29、输入项目负责人
    element: hidden_project_possessor
    action: input
    data: '{owner}'
  - step_name: 30、回车确认
    element: hidden_project_possessor
    action: enter
    data: null
  - step_name: 31、验证项目负责人选择{owner}
    element: project_possessor_check
    action: check_text
    data: '{owner}'
  - step_name: 32、选择优先级C
    element: priority_C
    action: click
    data: null
